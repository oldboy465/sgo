{% extends "base/base.html" %}

{% block title %}Página Não Encontrada - SparkManagerDocs{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
    <div class="rounded-full bg-red-100 p-6 mb-6">
        <i class="fas fa-exclamation-triangle fa-3x text-red-600"></i>
    </div>
    <h1 class="text-4xl font-bold text-gray-900 mb-2">404 - Página Não Encontrada</h1>
    <p class="text-gray-500 mb-8 max-w-md">
        O recurso que você está procurando (como <code>{{ request.path }}</code>) não existe ou foi movido.
    </p>
    <a href="{{ url_for('main.index') }}" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500">
        <i class="fas fa-home mr-2"></i> Voltar ao Início
    </a>
</div>
{% endblock %}
